<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fitness Ledger Web</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="final-pass.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark"><img src="assets/fitness-ledger-monogram.png" alt="Fitness Ledger monogram"></div><strong>FITNESS LEDGER</strong><small>MOVE. RECORD. KNOW.</small></div>
      <nav aria-label="主导航">
        <button class="nav-item is-active" data-view="home"><span>00</span><b>⌂</b>Home</button>
        <button class="nav-item" data-view="quick"><span>01</span><b>✎</b>Daily Entry</button>
        <button class="nav-item" data-view="body"><span>02</span><b>♙</b>Body</button>
        <button class="nav-item" data-view="diet"><span>03</span><b>♜</b>Diet</button>
        <button class="nav-item" data-view="training"><span>04</span><b>↔</b>Training</button>
        <button class="nav-item" data-view="movements"><span>05</span><b>⌁</b>Movement Progress</button>
        <button class="nav-item nav-tools" data-view="tools"><span>08</span><b>◌</b>Tools</button>
      </nav>
      <div class="privacy"><i></i><div>LOCAL-FIRST / PRIVATE<small>JSON remains the source of truth</small></div><div class="privacy-signals"><button class="health-nav-entry" data-data-check-open data-health-nav-entry hidden aria-label="查看待处理的数据问题"><span>Data</span><i class="health-nav-status" aria-hidden="true"></i></button><button class="health-nav-entry sync-nav-entry" data-cloud-sync-open data-sync-nav-entry hidden aria-label="查看云同步状态"><span>Sync</span><i class="health-nav-status sync-nav-status" aria-hidden="true"></i></button></div><button class="build-identity" type="button" data-build-identity aria-expanded="false" aria-label="查看运行版本"><span class="build-identity-label">BUILD UNKNOWN</span><i aria-hidden="true">⌄</i></button><span>▣</span></div>
    </aside>
    <main id="main" aria-live="polite"><div class="loading-page"><i></i><p>Loading your local journal…</p></div></main>
  </div>
  <div id="overlay-root"></div>
  <div id="toast" role="status"></div>
  <aside id="save-receipt" class="save-receipt" role="status" aria-live="polite"></aside>
  <script type="module" src="app.js"></script>
</body>
</html>
